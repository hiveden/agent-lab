<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    agent-lab · Radar
    设计语义：同心雷达圆环 + 深色底 + 单色扫描线 + 中心小"A"
    纯几何 SVG，可自由缩放；PNG 输出见 apps/web/scripts/gen-icons.mjs
  -->
  <rect width="512" height="512" rx="96" ry="96" fill="#1d1e22"/>

  <!-- 同心圆（雷达刻度） -->
  <g fill="none" stroke="#3f4046" stroke-width="2">
    <circle cx="256" cy="256" r="80"/>
    <circle cx="256" cy="256" r="140"/>
    <circle cx="256" cy="256" r="200"/>
  </g>

  <!-- 扫描扇形（指示 agent 在"追踪"） -->
  <g>
    <defs>
      <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ea580c" stop-opacity="0"/>
        <stop offset="100%" stop-color="#ea580c" stop-opacity="0.75"/>
      </linearGradient>
    </defs>
    <path d="M 256 256 L 256 56 A 200 200 0 0 1 427 156 Z" fill="url(#sweep)"/>
  </g>

  <!-- 中心发光点 -->
  <circle cx="256" cy="256" r="12" fill="#ea580c"/>

  <!-- 小目标点（被"雷达捕获"的 item） -->
  <circle cx="336" cy="188" r="5" fill="#ffffff"/>
  <circle cx="192" cy="196" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="324" cy="324" r="4" fill="#ffffff" opacity="0.4"/>
</svg>

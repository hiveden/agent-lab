# 本地 OTel Collector (Phase 3 of docs/22)
# 启动: bash docker/observability/start.sh

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: agent-lab-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      LANGFUSE_OTEL_ENDPOINT: ${LANGFUSE_OTEL_ENDPOINT:-https://us.cloud.langfuse.com/api/public/otel}
      LANGFUSE_AUTH_BASE64: ${LANGFUSE_AUTH_BASE64}
      # ClashX 7890 是 HTTP/SOCKS 混合, container 走 host.docker.internal
      HTTPS_PROXY: ${OTEL_HTTPS_PROXY:-http://host.docker.internal:7890}
      HTTP_PROXY: ${OTEL_HTTP_PROXY:-http://host.docker.internal:7890}
      NO_PROXY: localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
